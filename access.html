<!doctype html>
<html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>SIGNAL_01</title><style>
*{box-sizing:border-box}
:root{--bg:#020406;--red:#ff3434;--gold:#e7c27b;--muted:#aeb6c2;--line:rgba(255,255,255,.14)}
html,body{margin:0;background:var(--bg);color:#fff;font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;z-index:20;pointer-events:none;background:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px);background-size:100% 5px;mix-blend-mode:overlay;opacity:.18}
.noise{position:fixed;inset:-20%;z-index:21;pointer-events:none;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:noiseMove 1.2s steps(2) infinite}
@keyframes noiseMove{0%{transform:translate(0,0)}50%{transform:translate(-2%,1%)}100%{transform:translate(1%,-1%)}}
.hero{min-height:100vh;position:relative;display:flex;align-items:flex-end;justify-content:center;padding:22px 18px calc(36px + env(safe-area-inset-bottom));overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:url("landing.png") top center/cover no-repeat;opacity:.78;transform:scale(1.03)}
.hero::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 34%,rgba(255,255,255,.055),transparent 26%),linear-gradient(to bottom,rgba(2,4,6,.10),rgba(2,4,6,.58) 58%,#020406 100%)}
.topbar{position:absolute;top:18px;left:18px;right:18px;z-index:2;display:flex;justify-content:space-between;align-items:center;letter-spacing:.28em;font-size:11px;color:#dce2ea}
.content{position:relative;z-index:2;width:100%;max-width:560px;text-align:center;padding-top:38vh}
.time{color:#e6edf6;letter-spacing:.25em;font-size:13px;margin-bottom:10px}
.status{color:#fff;letter-spacing:.20em;font-size:12px;margin-bottom:40px}.status span{color:var(--red)}
h1{margin:0;font-size:clamp(52px,17vw,96px);line-height:.86;letter-spacing:.02em;font-weight:900;text-shadow:0 0 22px rgba(255,255,255,.22);animation:breath 4.8s ease-in-out infinite}
@keyframes breath{0%,100%{filter:brightness(1)}50%{filter:brightness(1.12)}}
.glitch{position:relative}.glitch::before,.glitch::after{content:attr(data-text);position:absolute;inset:0;opacity:0;pointer-events:none}.glitch::before{color:#ff3333;transform:translate(2px,0)}.glitch::after{color:#3ee7ff;transform:translate(-2px,0)}
.glitch.active::before,.glitch.active::after{opacity:.55;animation:glitchShift .22s steps(2) 1}
@keyframes glitchShift{0%{clip-path:inset(0 0 80% 0)}33%{clip-path:inset(35% 0 40% 0)}66%{clip-path:inset(70% 0 0 0)}100%{clip-path:inset(0 0 0 0)}}
.tagline{letter-spacing:.35em;color:#e9edf3;font-size:12px;margin:22px 0 28px}.tagline span{color:var(--red)}
.enter,.button{display:block;width:100%;padding:18px 20px;border-radius:16px;border:1px solid rgba(255,52,52,.85);background:rgba(8,10,14,.72);color:#fff;font-weight:900;font-size:14px;letter-spacing:.22em;box-shadow:0 0 32px rgba(255,52,52,.25);backdrop-filter:blur(8px);text-decoration:none;text-align:center}
.enter{animation:pulseRed 2.2s infinite}
@keyframes pulseRed{0%,100%{box-shadow:0 0 22px rgba(255,52,52,.22)}50%{box-shadow:0 0 44px rgba(255,52,52,.45)}}
.sound{margin-top:12px;background:transparent;border:0;color:#8d97a4;letter-spacing:.22em;font-size:10px;padding:10px;width:100%}
.page{min-height:100vh;padding:34px 20px 40px;display:flex;align-items:center;justify-content:center;text-align:center}
.inner{max-width:560px;width:100%}
.homebar{position:fixed;top:12px;left:12px;right:12px;z-index:50;display:flex;gap:10px;justify-content:space-between;align-items:center;pointer-events:none}
.homebar a{pointer-events:auto;text-decoration:none;color:#fff;background:rgba(10,12,18,.64);border:1px solid var(--line);border-radius:999px;padding:10px 13px;font-size:12px;letter-spacing:.16em;backdrop-filter:blur(8px)}
.kicker{color:var(--red);letter-spacing:.35em;font-weight:900;margin-bottom:22px}
.page h2{font-size:clamp(44px,13vw,76px);line-height:.9;margin:0 0 24px}
.page p{color:var(--muted);font-size:20px;line-height:1.55}
.access{margin-top:28px;padding:20px;border:1px solid var(--line);border-radius:22px;background:#10151c}
input{width:100%;padding:17px;border:0;border-radius:16px;background:#fff;color:#111;text-align:center;font-size:18px;letter-spacing:.20em;text-transform:uppercase}
button{width:100%;margin-top:12px;padding:17px;border:0;border-radius:16px;background:var(--red);color:#fff;font-weight:900;letter-spacing:.15em}
.output{min-height:58px;margin-top:16px;color:var(--gold);font-size:18px;line-height:1.4}.log{font-family:monospace;text-align:left;color:#9da7b5;padding:18px;background:#06080c;border:1px solid var(--line);border-radius:16px;margin-top:18px;display:none;white-space:pre-line}
.path-title{text-align:center;letter-spacing:.28em;color:#fff;margin-bottom:24px}
.path-card{border:1px solid var(--line);border-radius:22px;background:#0b1017;overflow:hidden;margin:16px auto;max-width:520px;text-align:left}
.path-card img{width:100%;height:170px;object-fit:cover;display:block;filter:brightness(.75) contrast(1.15)}
.path-body{padding:22px}.path-body h3{margin:0;letter-spacing:.18em;font-size:27px}.path-body p{color:#aeb6c2;font-size:18px}.keep{color:#ff4343}.lost{color:#4bd8d1}.hunted{color:#ff8a28}
.flash{position:fixed;inset:0;background:white;opacity:0;z-index:99;pointer-events:none}
.flash.on{animation:flash .38s ease-out}
@keyframes flash{0%{opacity:0}8%{opacity:.92}20%{opacity:.08}32%{opacity:.70}100%{opacity:0}}
.footer{color:#7d8794;text-align:center;font-size:12px;letter-spacing:.18em;padding:28px 18px 50px}
</style></head>
<body>
<div class="noise"></div>
<div class="homebar"><a href="index.html">HOME</a><a href="paths.html">PATHS</a></div>
<audio id="ambient" src="rain_wind.wav" loop preload="auto"></audio>
<audio id="signal" src="signal_click.wav" preload="auto"></audio>
<audio id="deniedSound" src="denied.wav" preload="auto"></audio>
<section class="page">
  <div class="inner">
    <div class="kicker">SIGNAL_01</div>
    <h2>THREE SYMBOLS.<br>ONE TRUTH.</h2>
    <p>You were not supposed to find it.</p>
    <button id="voiceBtn">RECEIVE TRANSMISSION</button>
    <div class="access">
      <input id="code" placeholder="ACCESS CODE">
      <button id="unlockBtn">UNLOCK</button>
      <div class="output" id="out"></div>
      <div class="log" id="log"></div>
    </div>
  </div>
</section>
<script>
const ambient=document.getElementById("ambient");
function startAmb(){ambient.volume=.26;ambient.play().catch(()=>{});}
function speakWelcome(){
 startAmb();
 if(!("speechSynthesis" in window)){document.getElementById("out").innerHTML="TRANSMISSION READY.";return;}
 speechSynthesis.cancel();
 const phrase="Benvenuto nel segnale. Da questo momento, ogni scelta verrà ricordata.";
 const u=new SpeechSynthesisUtterance(phrase);
 u.lang="it-IT"; u.rate=.82; u.pitch=.72; u.volume=.95;
 speechSynthesis.speak(u);
 document.getElementById("voiceBtn").textContent="TRANSMISSION RECEIVED";
}
document.getElementById("voiceBtn").addEventListener("click", speakWelcome);
document.getElementById("unlockBtn").addEventListener("click", unlock);
function unlock(){
 startAmb();
 const code=document.getElementById("code").value.trim().toUpperCase();
 const out=document.getElementById("out");
 const log=document.getElementById("log");
 if(code!=="SIGNAL01" && code!=="SIGNAL_01"){
   document.getElementById("deniedSound").volume=.42;document.getElementById("deniedSound").play().catch(()=>{});
   out.innerHTML="ACCESS DENIED.";
   log.style.display="block";
   log.textContent="> signal rejected\n> identity not recognized\n> try again";
   return;
 }
 const s=document.getElementById("signal"); s.volume=.48; s.play().catch(()=>{});
 out.innerHTML="DECRYPTING...";
 log.style.display="block";
 log.textContent="> signal accepted\n> opening hidden layer\n> locating three symbols";
 setTimeout(()=>{log.textContent+="\n> key fragment found"},700);
 setTimeout(()=>{log.textContent+="\n> book fragment found"},1300);
 setTimeout(()=>{log.textContent+="\n> ring fragment found"},1900);
 setTimeout(()=>{out.innerHTML="ACCESS GRANTED.";log.textContent+="\n> choose carefully"; setTimeout(()=>location.href="paths.html?storm=1",700);},2600);
}
</script>
</body></html>
